{% extends 'base.html' %}

{% block title %}Redefinir senha{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-xl-5">
        <div class="card animate-fade-in">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-1" style="color: var(--app-primary);">Redefinir senha</h4>
                <p class="text-muted small mb-4">Informe seu e-mail para receber as instruções de redefinição de senha.</p>

                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" name="email" id="email" class="form-control" placeholder="seu@email.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-send"></i> Enviar instruções
                    </button>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'accounts:login' %}" class="text-decoration-none small"><i class="bi bi-arrow-left"></i> Voltar ao login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
