{% extends 'base.html' %}

{% block title %}Link inválido{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8 col-xl-6">
        <div class="card">
            <div class="card-body p-4 text-center">
                <i class="bi bi-exclamation-triangle display-1 text-danger"></i>
                <h4 class="fw-bold mt-3">Link inválido ou expirado</h4>
                <p class="text-muted">Este link de redefinição de senha não é mais válido. Solicite uma nova redefinição.</p>
                <a href="{% url 'accounts:password_reset' %}" class="btn btn-primary">Solicitar nova redefinição</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
