{% if messages %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('toast-container');
    if (!container) return;
    {% for message in messages %}
    (function() {
        const types = {
            'success': 'bi-check-circle-fill text-success',
            'error': 'bi-exclamation-triangle-fill text-danger',
            'warning': 'bi-exclamation-circle-fill text-warning',
            'info': 'bi-info-circle-fill text-info'
        };
        const iconClass = types['{{ message.tags }}'] || types['info'];
        const toast = document.createElement('div');
        toast.className = 'toast show';
        toast.setAttribute('role', 'alert');
        toast.innerHTML =
            '<div class="toast-body d-flex align-items-center gap-2">' +
                '<i class="bi ' + iconClass + '"></i>' +
                '<div class="flex-grow-1">{{ message|escapejs }}</div>' +
                '<button type="button" class="btn-close" data-bs-dismiss="toast"></button>' +
            '</div>';
        toast.style = 'border-left: 4px solid {% if message.tags == "success" %}var(--emerald){% elif message.tags == "error" %}var(--rose){% elif message.tags == "warning" %}var(--amber){% else %}var(--cyan){% endif %};';
        container.appendChild(toast);
        setTimeout(function() {
            const inst = bootstrap.Toast.getOrCreateInstance(toast);
            inst.hide();
            toast.addEventListener('hidden.bs.toast', function() { toast.remove(); });
        }, 5000);
    })();
    {% endfor %}
});
</script>
{% endif %}
