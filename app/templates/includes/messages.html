{% if messages %}
<div class="container mt-3">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show d-flex align-items-center" role="alert">
        <i class="bi {% if message.tags == 'success' %}bi-check-circle-fill text-success{% elif message.tags == 'error' %}bi-exclamation-triangle-fill text-danger{% elif message.tags == 'warning' %}bi-exclamation-circle-fill text-warning{% else %}bi-info-circle-fill text-info{% endif %} me-2"></i>
        <div>{{ message }}</div>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Fechar"></button>
    </div>
    {% endfor %}
</div>
<script>
document.querySelectorAll('.alert-dismissible').forEach(function(el) {
    setTimeout(function() { bootstrap.Alert.getOrCreateInstance(el).close(); }, 5000);
});
</script>
{% endif %}
