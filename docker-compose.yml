services:
  web:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ./app:/app
      - sqlite_data:/app/data
      - media_data:/app/media
    command: gunicorn config.wsgi:application --bind 0.0.0.0:3001 --workers 3 --reload

volumes:
  sqlite_data:
  media_data:
